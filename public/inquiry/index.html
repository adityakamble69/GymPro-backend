<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Our Gym — Inquiry Form</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #060910;
      --surface: #0d1117;
      --elevated: #161b22;
      --border: #21262d;
      --border2: #30363d;
      --blue: #2f81f7;
      --blue-dim: #1f6feb;
      --blue-glow: rgba(47, 129, 247, 0.15);
      --blue-faint: rgba(47, 129, 247, 0.06);
      --text: #e6edf3;
      --text2: #8b949e;
      --text3: #484f58;
      --green: #3fb950;
      --red: #f85149;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(47, 129, 247, 0.12), transparent),
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 100% 100%, 40px 40px, 40px 40px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 580px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--blue);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(47, 129, 247, 0.4);
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    h1 span {
      color: var(--blue);
    }

    .subtitle {
      color: var(--text2);
      font-size: 15px;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input,
    select,
    textarea {
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--blue-dim);
      box-shadow: 0 0 0 3px var(--blue-glow);
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    select option {
      background: var(--elevated);
    }

    /* ── PHOTO CAPTURE ── */
    .photo-section {
      background: var(--elevated);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .photo-preview-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--border2);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s;
    }

    .photo-preview-wrap.has-photo {
      border-color: var(--green);
      box-shadow: 0 0 14px rgba(63, 185, 80, 0.3);
    }

    .photo-placeholder {
      color: var(--text3);
      font-size: 40px;
      line-height: 1;
    }

    #photoPreview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      position: absolute;
      inset: 0;
    }

    .camera-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    #videoEl {
      width: 100%;
      max-width: 320px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: #000;
      display: none;
      aspect-ratio: 4/3;
      object-fit: cover;
    }

    #videoEl.active {
      display: block;
    }

    .camera-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .cam-btn {
      padding: 9px 18px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--elevated);
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cam-btn:hover {
      border-color: var(--blue);
      color: var(--blue);
    }

    .cam-btn.primary {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .cam-btn.primary:hover {
      background: var(--blue-dim);
    }

    .cam-btn.success {
      background: rgba(63, 185, 80, 0.12);
      border-color: var(--green);
      color: var(--green);
    }

    .cam-btn.danger {
      background: rgba(248, 81, 73, 0.1);
      border-color: var(--red);
      color: var(--red);
    }

    .photo-status {
      font-size: 12px;
      color: var(--text2);
      text-align: center;
    }

    .photo-status.ok {
      color: var(--green);
    }

    .photo-status.warn {
      color: var(--text3);
    }

    /* Upload fallback */
    .upload-label {
      font-size: 12px;
      color: var(--text3);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.15s;
    }

    .upload-label:hover {
      color: var(--text2);
    }

    #fileInput {
      display: none;
    }

    /* Canvas (hidden) */
    #snapCanvas {
      display: none;
    }

    /* Pills */
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      padding: 7px 16px;
      border-radius: 99px;
      border: 1px solid var(--border2);
      background: var(--elevated);
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .pill:hover {
      border-color: var(--blue-dim);
      color: var(--blue);
    }

    .pill.active {
      background: var(--blue-faint);
      border-color: var(--blue);
      color: var(--blue);
      font-weight: 600;
    }

    /* Plan cards */
    .plan-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .plan-card {
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: var(--elevated);
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .plan-card:hover {
      border-color: var(--blue-dim);
      background: var(--blue-faint);
    }

    .plan-card.active {
      border-color: var(--blue);
      background: var(--blue-faint);
      box-shadow: 0 0 0 3px var(--blue-glow);
    }

    .plan-card-left {
      flex: 1;
    }

    .plan-card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .plan-card-meta {
      font-size: 12px;
      color: var(--text2);
    }

    .plan-card-features {
      font-size: 11px;
      color: var(--text3);
      margin-top: 4px;
    }

    .plan-card-price {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: var(--blue);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .plan-radio {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .plan-card.active .plan-radio {
      border-color: var(--blue);
      background: var(--blue);
    }

    .plan-card.active .plan-radio::after {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
    }

    .plan-skeleton {
      height: 56px;
      border-radius: 10px;
      background: var(--elevated);
      border: 1px solid var(--border);
      animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    .plans-error {
      color: var(--text2);
      font-size: 13px;
      text-align: center;
      padding: 12px;
    }

    /* Submit */
    .submit-btn {
      width: 100%;
      padding: 13px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      box-shadow: 0 4px 20px rgba(47, 129, 247, 0.3);
    }

    .submit-btn:hover {
      background: var(--blue-dim);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(47, 129, 247, 0.4);
    }

    .submit-btn:disabled {
      background: var(--elevated);
      color: var(--text3);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .alert {
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      margin-top: 16px;
      text-align: center;
    }

    .alert.success {
      background: rgba(63, 185, 80, 0.1);
      border: 1px solid rgba(63, 185, 80, 0.3);
      color: var(--green);
      display: block;
    }

    .alert.error {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.3);
      color: var(--red);
      display: block;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    .footer-note {
      text-align: center;
      color: var(--text3);
      font-size: 12px;
      margin-top: 20px;
    }

    @media (max-width: 500px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .full {
        grid-column: 1;
      }

      h1 {
        font-size: 26px;
      }

      .card {
        padding: 24px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <span class="logo-text">GymPro</span>
      </div>
      <h1>Start Your <span>Fitness</span> Journey</h1>
      <p class="subtitle">Fill out the form below and our team will<br />get back to you within 24 hours.</p>
    </div>

    <div class="card">
      <form id="inquiryForm">
        <div class="grid">

          <!-- Full Name -->
          <div class="field full">
            <label>Full Name *</label>
            <input type="text" id="full_name" placeholder="Enter your full name" required />
          </div>

          <!-- Email -->
          <div class="field">
            <label>Email Address *</label>
            <input type="email" id="email" placeholder="you@example.com" required />
          </div>

          <!-- Phone -->
          <div class="field">
            <label>Phone Number *</label>
            <input type="tel" id="phone" placeholder="9876543210" required />
          </div>

          <!-- Gender -->
          <div class="field">
            <label>Gender <span style="color:var(--text3);font-size:10px;text-transform:none;letter-spacing:0">(Optional)</span></label>
            <select id="gender">
              <option value="">Select gender</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>

          <!-- Date of Birth -->
          <div class="field">
            <label>Date of Birth <span style="color:var(--text3);font-size:10px;text-transform:none;letter-spacing:0">(Optional)</span></label>
            <input type="date" id="date_of_birth" max="" />
          </div>

          <!-- Address -->
          <div class="field full">
            <label>Address <span style="color:var(--text3);font-size:10px;text-transform:none;letter-spacing:0">(Optional)</span></label>
            <input type="text" id="address" placeholder="Your city or full address" />
          </div>

          <!-- ── PHOTO CAPTURE ── -->
          <div class="field full">
            <label>Your Photo <span
                style="color:var(--text3);font-size:10px;text-transform:none;letter-spacing:0">(Optional)</span></label>
            <div class="photo-section">

              <div
                style="display:flex; align-items:center; gap:20px; width:100%; flex-wrap:wrap; justify-content:center;">
                <!-- Preview circle -->
                <div class="photo-preview-wrap" id="previewWrap">
                  <div class="photo-placeholder" id="photoPlaceholder">👤</div>
                  <img id="photoPreview" alt="Your photo" />
                </div>

                <!-- Camera area -->
                <div class="camera-area" style="flex:1; min-width:200px;">
                  <video id="videoEl" autoplay playsinline muted></video>
                  <canvas id="snapCanvas"></canvas>

                  <div class="camera-btns" id="cameraBtns">
                    <!-- State: idle -->
                    <button type="button" class="cam-btn primary" id="btnOpenCam">📷 Open Camera</button>
                    <label class="cam-btn upload-label" for="fileInput"
                      style="text-decoration:none; padding:9px 18px;">🖼️ Upload Photo</label>
                    <input type="file" id="fileInput" accept="image/*" />
                  </div>

                  <div class="photo-status warn" id="photoStatus">No photo taken yet</div>
                </div>
              </div>

            </div>
            <input type="hidden" id="photoData" value="" />
          </div>

          <!-- Membership Plans — DYNAMIC -->
          <div class="field full">
            <label>Membership Interest</label>
            <div class="plan-cards" id="planContainer">
              <div class="plan-skeleton"></div>
              <div class="plan-skeleton"></div>
              <div class="plan-skeleton"></div>
            </div>
            <input type="hidden" id="membership_interest" value="not_sure" />
          </div>

          <!-- Preferred Time -->
          <div class="field full">
            <label>Preferred Visit Time</label>
            <div class="pills">
              <div class="pill active" data-val="anytime" onclick="selectPill(this,'time')">Anytime</div>
              <div class="pill" data-val="morning" onclick="selectPill(this,'time')">🌅 Morning (6am–12pm)</div>
              <div class="pill" data-val="afternoon" onclick="selectPill(this,'time')">☀️ Afternoon (12pm–5pm)</div>
              <div class="pill" data-val="evening" onclick="selectPill(this,'time')">🌆 Evening (5pm–10pm)</div>
            </div>
            <input type="hidden" id="preferred_time" value="anytime" />
          </div>

          <!-- Message -->
          <div class="field full">
            <label>Message / Questions</label>
            <textarea id="message" placeholder="Tell us about your fitness goals, any questions..."></textarea>
          </div>

        </div>

        <div class="divider"></div>

        <button type="submit" class="submit-btn" id="submitBtn">SEND INQUIRY →</button>
        <div class="alert" id="alertBox"></div>
      </form>
    </div>

    <p class="footer-note">🔒 Your information is safe with us. No spam, ever.</p>
  </div>

  <script>
    const API = 'http://localhost:5000/api';

    // Set max date for DOB to today
    document.getElementById('date_of_birth').max = new Date().toISOString().split('T')[0];

    // ── Camera State ──────────────────────────────────────────────────────────────
    let stream = null;
    let photoTaken = false;
    const video = document.getElementById('videoEl');
    const canvas = document.getElementById('snapCanvas');
    const preview = document.getElementById('photoPreview');
    const previewWrap = document.getElementById('previewWrap');
    const photoStatus = document.getElementById('photoStatus');
    const cameraBtns = document.getElementById('cameraBtns');
    const photoPlaceholder = document.getElementById('photoPlaceholder');

    // ── Open Camera ───────────────────────────────────────────────────────────────
    document.getElementById('btnOpenCam').addEventListener('click', async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 }, audio: false });
        video.srcObject = stream;
        video.classList.add('active');
        cameraBtns.innerHTML = `
      <button type="button" class="cam-btn primary" id="btnSnap">📸 Take Photo</button>
      <button type="button" class="cam-btn danger"  id="btnCancelCam">✕ Cancel</button>
    `;
        document.getElementById('btnSnap').onclick = takePhoto;
        document.getElementById('btnCancelCam').onclick = stopCamera;
        photoStatus.textContent = 'Position your face in the circle and click Take Photo';
        photoStatus.className = 'photo-status warn';
      } catch (err) {
        photoStatus.textContent = '⚠️ Camera access denied. Please upload a photo instead.';
        photoStatus.className = 'photo-status';
      }
    });

    // ── Take Photo ────────────────────────────────────────────────────────────────
    function takePhoto() {
      const w = video.videoWidth || 640;
      const h = video.videoHeight || 480;
      canvas.width = w;
      canvas.height = h;

      const ctx = canvas.getContext('2d');
      // Mirror flip for selfie
      ctx.translate(w, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, w, h);

      const dataURL = canvas.toDataURL('image/jpeg', 0.75);
      showPhoto(dataURL);
      stopCamera();
    }

    // ── Stop Camera ───────────────────────────────────────────────────────────────
    function stopCamera() {
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      video.classList.remove('active');
      video.srcObject = null;
      resetCameraButtons();
    }

    // ── Show captured/uploaded photo ──────────────────────────────────────────────
    function showPhoto(dataURL) {
      document.getElementById('photoData').value = dataURL;
      preview.src = dataURL;
      preview.style.display = 'block';
      photoPlaceholder.style.display = 'none';
      previewWrap.classList.add('has-photo');
      photoTaken = true;
      photoStatus.textContent = '✅ Photo captured!';
      photoStatus.className = 'photo-status ok';
      resetCameraButtons(true);
    }

    // ── Reset camera buttons ──────────────────────────────────────────────────────
    function resetCameraButtons(hasPhoto = false) {
      cameraBtns.innerHTML = hasPhoto
        ? `<button type="button" class="cam-btn primary" id="btnOpenCam">📷 Retake</button>
       <button type="button" class="cam-btn danger"  id="btnRemovePhoto">🗑️ Remove</button>
       <label class="cam-btn" for="fileInput" style="padding:9px 18px;">🖼️ Upload</label>
       <input type="file" id="fileInput" accept="image/*" style="display:none"/>`
        : `<button type="button" class="cam-btn primary" id="btnOpenCam">📷 Open Camera</button>
       <label class="cam-btn" for="fileInput" style="padding:9px 18px;">🖼️ Upload Photo</label>
       <input type="file" id="fileInput" accept="image/*" style="display:none"/>`;

      document.getElementById('btnOpenCam').addEventListener('click', async () => {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 }, audio: false });
          video.srcObject = stream;
          video.classList.add('active');
          cameraBtns.innerHTML = `
        <button type="button" class="cam-btn primary" id="btnSnap">📸 Take Photo</button>
        <button type="button" class="cam-btn danger"  id="btnCancelCam">✕ Cancel</button>
      `;
          document.getElementById('btnSnap').onclick = takePhoto;
          document.getElementById('btnCancelCam').onclick = stopCamera;
          photoStatus.textContent = 'Position your face and click Take Photo';
          photoStatus.className = 'photo-status warn';
        } catch (err) {
          photoStatus.textContent = '⚠️ Camera access denied. Please upload a photo.';
          photoStatus.className = 'photo-status';
        }
      });

      if (hasPhoto) {
        document.getElementById('btnRemovePhoto').addEventListener('click', removePhoto);
      }

      document.getElementById('fileInput').addEventListener('change', handleFileUpload);
    }

    // ── Remove photo ──────────────────────────────────────────────────────────────
    function removePhoto() {
      document.getElementById('photoData').value = '';
      preview.style.display = 'block'; // hide
      preview.src = '';
      preview.style.display = 'none';
      photoPlaceholder.style.display = 'block';
      previewWrap.classList.remove('has-photo');
      photoTaken = false;
      photoStatus.textContent = 'No photo taken yet';
      photoStatus.className = 'photo-status warn';
      resetCameraButtons(false);
    }

    // ── File Upload ───────────────────────────────────────────────────────────────
    function handleFileUpload(e) {
      const file = e.target.files[0];
      if (!file) return;

      if (file.size > 5 * 1024 * 1024) {
        photoStatus.textContent = '⚠️ File too large. Max 5MB.';
        photoStatus.className = 'photo-status';
        return;
      }

      const reader = new FileReader();
      reader.onload = (ev) => {
        // Resize to max 640px
        const img = new Image();
        img.onload = () => {
          const MAX = 640;
          let w = img.width, h = img.height;
          if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          showPhoto(canvas.toDataURL('image/jpeg', 0.75));
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    // Initial file input listener
    document.getElementById('fileInput').addEventListener('change', handleFileUpload);

    // ── Load Plans from API ───────────────────────────────────────────────────────
    function durationLabel(type, days) {
      if (type === 'monthly') return '1 Month';
      if (type === 'quarterly') return `${Math.round(days / 30)} Months`;
      if (type === 'yearly') return '1 Year';
      return `${days} Days`;
    }

    async function loadPlans() {
      const container = document.getElementById('planContainer');
      try {
        const res = await fetch(`${API}/membership-plans/public`);
        const json = await res.json();
        if (!json.success || !json.data.length) throw new Error("No plans");

        container.innerHTML = '';

        // Not Sure option
        const notSure = document.createElement('div');
        notSure.className = 'plan-card active';
        notSure.dataset.val = 'not_sure';
        notSure.innerHTML = `<div class="plan-radio"></div><div class="plan-card-left"><div class="plan-card-name">Not Sure Yet</div><div class="plan-card-meta">I'll decide after visiting</div></div>`;
        notSure.onclick = () => selectPlan(notSure, 'not_sure');
        container.appendChild(notSure);

        json.data.forEach(plan => {
          const features = plan.features ? plan.features.split(',').slice(0, 3).map(f => f.trim()).join(' · ') : '';
          const el = document.createElement('div');
          el.className = 'plan-card';
          el.dataset.val = plan.duration_type;
          el.innerHTML = `
        <div class="plan-radio"></div>
        <div class="plan-card-left">
          <div class="plan-card-name">${plan.name}</div>
          <div class="plan-card-meta">${durationLabel(plan.duration_type, plan.duration_days)}</div>
          ${features ? `<div class="plan-card-features">${features}</div>` : ''}
        </div>
        <div class="plan-card-price">₹${Number(plan.price).toLocaleString('en-IN')}</div>
      `;
          el.onclick = () => selectPlan(el, plan.duration_type);
          container.appendChild(el);
        });

      } catch (err) {
        container.innerHTML = `
      <div class="plans-error">Could not load plans. Please select below:</div>
      <div class="pills" style="margin-top:8px">
        <div class="pill active" data-val="not_sure" onclick="selectPill(this,'interest')">Not Sure</div>
        <div class="pill" data-val="basic"    onclick="selectPill(this,'interest')">Basic</div>
        <div class="pill" data-val="standard" onclick="selectPill(this,'interest')">Standard</div>
        <div class="pill" data-val="premium"  onclick="selectPill(this,'interest')">Premium</div>
      </div>`;
      }
    }

    function selectPlan(el, value) {
      document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('membership_interest').value = value;
    }

    function selectPill(el, group) {
      el.parentElement.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      if (group === 'interest') document.getElementById('membership_interest').value = el.dataset.val;
      if (group === 'time') document.getElementById('preferred_time').value = el.dataset.val;
    }

    // ── Form Submit ───────────────────────────────────────────────────────────────
    document.getElementById('inquiryForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const alertBox = document.getElementById('alertBox');
      alertBox.className = 'alert';
      alertBox.textContent = '';

      const data = {
        full_name: document.getElementById('full_name').value.trim(),
        email: document.getElementById('email').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        gender: document.getElementById('gender').value || null,
        date_of_birth: document.getElementById('date_of_birth').value || null,
        address: document.getElementById('address').value.trim() || null,
        message: document.getElementById('message').value.trim(),
        membership_interest: document.getElementById('membership_interest').value,
        preferred_time: document.getElementById('preferred_time').value,
        photo: document.getElementById('photoData').value || null,
      };

      if (!data.full_name || !data.email || !data.phone) {
        alertBox.className = 'alert error';
        alertBox.textContent = '⚠️ Please fill in Name, Email and Phone.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch(`${API}/inquiries/submit`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const json = await res.json();

        if (json.success) {
          alertBox.className = 'alert success';
          alertBox.textContent = '✅ Thank you! We will contact you within 24 hours.';
          document.getElementById('inquiryForm').reset();
          removePhoto();
          // Reset plan cards
          document.querySelectorAll('.plan-card').forEach((c, i) => c.classList.toggle('active', i === 0));
          document.getElementById('membership_interest').value = 'not_sure';
          // Reset time pills
          document.querySelectorAll('#inquiryForm .pills .pill').forEach((p, i) => p.classList.toggle('active', i === 0));
          document.getElementById('preferred_time').value = 'anytime';
          btn.textContent = 'SENT ✓';
        } else {
          throw new Error(json.message);
        }
      } catch (err) {
        alertBox.className = 'alert error';
        alertBox.textContent = '❌ ' + (err.message || 'Something went wrong. Please try again.');
        btn.disabled = false;
        btn.textContent = 'SEND INQUIRY →';
      }
    });

    // ── Init ──────────────────────────────────────────────────────────────────────
    loadPlans();
  </script>
</body>

</html>
